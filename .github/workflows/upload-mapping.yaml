name: Mapping Upload

on:
  workflow_dispatch:

jobs:
  mapping-test:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission to Gradle
        run: chmod +x ./gradlew

      - name: Decode Android Keystore
        run: |
          mkdir -p keystore

          echo "${{ secrets.KEYSTORE_BASE64 }}" \
            | base64 -d \
            > keystore/release.jks

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease

      - name: Verify APK signature
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -n 1)

          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner verify \
            --verbose \
            app/build/outputs/apk/release/app-release.apk

      - name: Verify generated files
        run: |
          ls -R app/build/outputs/
          ls -R app/build/outputs/mapping/

      - name: Find Crashlytics mapping file ID XML
        run: |
          echo "Searching for Crashlytics mappingfileid XML..."

          find app/build -iname "*mappingfileid*" || true

          echo ""
          echo "Detailed XML search:"

          find app/build \
            -type f \
            \( -iname "*.xml" -o -iname "*crashlytics*" \) \
            | sort || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload Mapping artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-mapping
          path: app/build/outputs/mapping/release/mapping.txt

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Upload APK to Firebase App Distribution
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase appdistribution:distribute \
          app/build/outputs/apk/release/app-release.apk \
          --app ${{ secrets.FIREBASE_APP_ID }} \
          --groups "testers"

      - name: Upload mapping file to Crashlytics
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew app:uploadCrashlyticsMappingFileRelease